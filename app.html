  :root {
    --bg: #080C16;
    --surface: #0F1422;
    --surface2: #161C2D;
    --surface3: #1D2540;
    --border: #2A3352;
    --text: #EEF2FF;
    --text-muted: #7B8DB0;
    --text-dim: #4A5578;
    --amber: #F59E0B;
    --amber-dim: #B45309;
    --amber-glow: rgba(245,158,11,0.15);
    --green: #10B981;
    --green-dim: rgba(16,185,129,0.15);
    --red: #F43F5E;
    --red-dim: rgba(244,63,94,0.12);
    --blue: #6366F1;
    --blue-dim: rgba(99,102,241,0.15);
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-amber: 0 0 20px rgba(245,158,11,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }
  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Animations */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes scanLine { 0% { top: 0%; } 100% { top: 100%; } }
  @keyframes successPop { 0% { transform:scale(0.8); opacity:0; } 60% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:0.7;} }

  .fade-in { animation: fadeIn 0.3s ease forwards; }
  .slide-in { animation: slideIn 0.25s ease forwards; }
</style>

const formatDate = (d) => {
  const date = new Date(d);
  return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
};

const getWeekDays = () => {
  // Returns Mon–Sun of current week with presence data
  const today = new Date('2025-04-26');
  const day = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // Presence check: if log exists for that date for u1
  const presentDates = MOCK_LOGS.filter(l=>l.memberId==='u1').map(l=>l.date);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const dateStr = d.toISOString().split('T')[0];
    const isFuture = d > today;
    const isToday = dateStr === today.toISOString().split('T')[0];
    return {
      label: days[i],
      date: d.getDate(),
      dateStr,
      present: presentDates.includes(dateStr),
      isFuture,
      isToday,
    };
  });
};

      const q = search.toLowerCase();
      const matchQ = !q || m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q);
      const matchF = filter==='all' || m.status===filter;
      return matchQ && matchF;
    });
  },[search,filter]);

  const columns = [
    {key:'name',label:'Name',render:(v,row)=>React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
      React.createElement('div',{style:{width:'30px',height:'30px',borderRadius:'50%',background:'var(--amber-glow)',border:'1px solid var(--amber)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,color:'var(--amber)',flexShrink:0}},v[0]),
      React.createElement('div',null,
        React.createElement('div',{style:{fontWeight:600,fontSize:'13px'}},v),
        React.createElement('div',{style:{fontSize:'11px',color:'var(--text-muted)',fontFamily:'DM Mono,monospace'}},row.phone||'—')
      )
    )},
    {key:'email',label:'Email',render:v=>React.createElement('span',{style:{fontFamily:'DM Mono,monospace',fontSize:'12px',color:'var(--text-muted)'}},v)},
    {key:'status',label:'Status',render:v=>React.createElement(Badge,{label:v==='active'?'Active':'Expired',color:v==='active'?'green':'red'})},
    {key:'membershipExpiry',label:'Expiry',render:v=>React.createElement('span',{style:{fontFamily:'DM Mono,monospace',fontSize:'12px'}},formatDate(v))},
    {key:'id',label:'Actions',render:(_,row)=>React.createElement('div',{style:{display:'flex',gap:'6px'}},
      React.createElement(Btn,{variant:'ghost',size:'sm'},'Edit'),
      React.createElement(Btn,{variant:'danger',size:'sm',onClick:()=>setDeleteModal(row)},'Delete')
    )},
  ];

  return React.createElement('div',{className:'fade-in',style:{display:'flex',flexDirection:'column',gap:'20px'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,letterSpacing:'-0.02em'}},'Members'),
        React.createElement('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginTop:'2px'}},`${MOCK_MEMBERS.length} total members`)
      )
    ),
    // Search + Filter
    React.createElement(Card,{style:{padding:'14px 16px'}},
      React.createElement('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'flex-end'}},
        React.createElement('div',{style:{flex:1,minWidth:'180px'}},
          React.createElement(Input,{placeholder:'Search by name or email…',value:search,onChange:e=>setSearch(e.target.value),icon:'🔍'})
        ),
        React.createElement('div',{style:{display:'flex',gap:'6px'}},
          ['all','active','expired'].map(f=>React.createElement('button',{key:f,onClick:()=>setFilter(f),style:{padding:'8px 14px',borderRadius:'7px',border:`1px solid ${filter===f?'var(--amber)':'var(--border)'}`,background:filter===f?'var(--amber-glow)':'transparent',color:filter===f?'var(--amber)':'var(--text-muted)',cursor:'pointer',fontSize:'12px',fontWeight:600,textTransform:'capitalize',transition:'all 0.15s'}},f))
        )
      )
    ),
    loading
      ? React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}}, Array(5).fill(0).map((_,i)=>React.createElement(Skeleton,{key:i,h:52,radius:8})))
      : React.createElement(Table,{columns,rows:filtered,emptyState:React.createElement(EmptyState,{icon:'👥',title:'No members found',sub:'Try adjusting your search or filter.'})
    }),
    // Delete Confirmation Modal
    React.createElement(Modal,{show:!!deleteModal,onClose:()=>setDeleteModal(null),title:'Confirm Deletion',width:400},
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},
        React.createElement('div',{style:{fontSize:'14px',color:'var(--text-muted)',lineHeight:'1.6'}},
          `Are you sure you want to delete `, React.createElement('strong',{style:{color:'var(--text)'}},deleteModal?.name), `? This action cannot be undone.`
        ),
        React.createElement('div',{style:{display:'flex',gap:'10px'}},
          React.createElement(Btn,{variant:'danger',fullWidth:true,onClick:()=>setDeleteModal(null)},'Yes, Delete'),
          React.createElement(Btn,{variant:'ghost',fullWidth:true,onClick:()=>setDeleteModal(null)},'Cancel')
        )
      )
    )
  );
};

// ============================================================
// PAGE: Admin Logs (Master)
// Firebase: getDocs(query(collection(db,'attendance'), orderBy('date','desc')))
// ============================================================

const AdminLogsPage = () => {
  const [search,setSearch]=useState('');
  const [from,setFrom]=useState('');
  const [to,setTo]=useState('');
  const [memberFilter,setMemberFilter]=useState('');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{ setTimeout(()=>setLoading(false),700); },[]);

  const filtered=useMemo(()=>{
    return MOCK_LOGS.filter(l=>{
      const q=search.toLowerCase();
      if(q && !l.memberName.toLowerCase().includes(q)) return false;
      if(from && l.date<from) return false;
      if(to && l.date>to) return false;
      if(memberFilter && l.memberId!==memberFilter) return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));
  },[search,from,to,memberFilter]);

  const columns=[
    {key:'memberName',label:'Member'},
    {key:'date',label:'Date',render:v=>React.createElement('span',{style:{fontFamily:'DM Mono,monospace',fontSize:'12px'}},formatDate(v))},
    {key:'entryTime',label:'Entry',mono:true},
    {key:'exitTime',label:'Exit',mono:true},
    {key:'duration',label:'Duration',render:v=>React.createElement(Badge,{label:v,color:'amber'})},
  ];

  return React.createElement('div',{className:'fade-in',style:{display:'flex',flexDirection:'column',gap:'20px'}},
    React.createElement('div',null,
      React.createElement('div',{style:{fontFamily:'Syne,sans-serif',fontSize:'22px',fontWeight:800,letterSpacing:'-0.02em'}},'Attendance Logs'),
      React.createElement('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginTop:'2px'}},'Master log of all member check-ins')
    ),
    React.createElement(Card,null,
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}},
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
          React.createElement(Input,{label:'From',type:'date',value:from,onChange:e=>setFrom(e.target.value)}),
          React.createElement(Input,{label:'To',type:'date',value:to,onChange:e=>setTo(e.target.value)})
        ),
        React.createElement('div',{style:{display:'flex',gap:'10px',alignItems:'flex-end',flexWrap:'wrap'}},
          React.createElement('div',{style:{flex:1,minWidth:'180px'}},
            React.createElement(Input,{placeholder:'Search member name…',value:search,onChange:e=>setSearch(e.target.value),icon:'🔍'})
          ),
          React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
            React.createElement('label',{style:{fontSize:'12px',fontWeight:600,color:'var(--text-muted)',letterSpacing:'0.05em',textTransform:'uppercase'}},'Member'),
            React.createElement('select',{value:memberFilter,onChange:e=>setMemberFilter(e.target.value),style:{padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontFamily:'DM Sans,sans-serif',fontSize:'13px',outline:'none',cursor:'pointer'}},
              React.createElement('option',{value:''},'All Members'),
              MOCK_MEMBERS.map(m=>React.createElement('option',{key:m.id,value:m.id},m.name))
            )
          ),
          (from||to||search||memberFilter) && React.createElement(Btn,{variant:'ghost',size:'sm',onClick:()=>{setFrom('');setTo('');setSearch('');setMemberFilter('');}}, '× Clear')
        )
      )
    ),
    React.createElement('div',{style:{fontSize:'12px',color:'var(--text-muted)'}}, `Showing ${filtered.length} of ${MOCK_LOGS.length} records`),
    loading
      ? React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}}, Array(5).fill(0).map((_,i)=>React.createElement(Skeleton,{key:i,h:52,radius:8})))
      : React.createElement(Table,{columns,rows:filtered,emptyState:React.createElement(EmptyState,{icon:'📊',title:'No logs found',sub:'Try adjusting your filters.'})})
  );
};

// ============================================================
// ROOT APP — Navigation Router
// ============================================================

const App = () => {
  const [user,setUser]=useState(null); // null = not logged in
  const [page,setPage]=useState('dashboard');

  const handleLogin = (u) => {
    setUser(u);
    setPage(u.role==='admin' ? 'admin-dashboard' : 'dashboard');
  };
  const handleLogout = () => { setUser(null); setPage('dashboard'); };
  const nav = (p) => setPage(p);

  if(!user) return React.createElement(LoginPage, {onLogin:handleLogin});

  // MEMBER FLOW
  if(user.role === 'member') {
    return React.createElement(MemberLayout, {user, onLogout:handleLogout, onNav:nav, currentPage:page},
      page==='dashboard' && React.createElement(MemberDashboard,{user, onNav:nav}),
      page==='scan' && React.createElement(ScanQRPage,{onBack:()=>nav('dashboard')}),
      page==='member-logs' && React.createElement(MemberLogsPage,{user, onBack:()=>nav('dashboard')}),
    );
  }

  // ADMIN FLOW
  return React.createElement(AdminLayout, {user, onLogout:handleLogout, onNav:nav, currentPage:page},
    page==='admin-dashboard' && React.createElement(AdminDashboardPage),
    page==='admin-add' && React.createElement(AddMemberPage),
    page==='admin-members' && React.createElement(ViewMembersPage),
    page==='admin-logs' && React.createElement(AdminLogsPage),
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
